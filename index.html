<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Student Finance Tracker</h1>
</header>

<main>

    <section>
        <h2>About</h2>
        <p>Track student expenses and spending habits.</p>
    </section>

    <section>
        <h2>Dashboard</h2>
        <p>Total Transactions: 0</p>
        <p>Total Spending: $0</p>
    </section>

    <section>
        <h2>Add Transaction</h2>

        <form>
            <label>Description</label>
            <input type="text">

            <label>Amount</label>
            <input type="number">

            <label>Category</label>
            <select>
                <option>Food</option>
                <option>Books</option>
                <option>Transport</option>
                <option>Entertainment</option>
                <option>Fees</option>
                <option>Other</option>
            </select>

            <label>Date</label>
            <input type="date">

            <button type="submit">Add</button>
        </form>
    </section>

    <section>
        <h2>Transactions</h2>

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
            </tbody>
        </table>
    </section>

    <section>
        <h2>Settings</h2>

        <label>Budget Cap</label>
        <input type="number">
    </section>

</main>

<footer>
    <p>Your Name</p>
</footer>

<script src="app.js"></script>

</body>
</html>
