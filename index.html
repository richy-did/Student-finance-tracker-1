<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Student Finance Tracker</h1>
</header>

<main>

    <section>
        <h2>About</h2>
        <p>Track student expenses and spending habits.</p>
    </section>

    
    <section>
        <h2>Dashboard</h2>

        <p>Total Transactions:
            <span id="totalTransactions">0</span>
        </p>

        <p>Total Spending:
            $<span id="totalSpending">0</span>
        </p>

        <p>Top Category:
            <span id="topCategory">None</span>
        </p>

        <p id="budgetMessage" aria-live="polite"></p>
    </section>

    <section>
        <h2>Search Transactions</h2>

        <input type="text" id="searchInput" placeholder="Enter regex pattern">

        <label>
            <input type="checkbox" id="caseInsensitive" checked>
        Ignore Case
        </label>

        <button id="searchBtn">Search</button>

        <p id="searchStatus"></p>
    </section>

    <section>
        <h2>Add Transaction</h2>

        <form id="transactionForm">

            <label for="description">Description</label>
            <input id="description" type="text">
            <small id="descriptionError"></small>

            <label for="amount">Amount</label>
            <input id="amount" type="text">
            <small id="amountError"></small>

            <label for="category">Category</label>
            <input id="category" type="text">
            <small id="categoryError"></small>

            <label for="date">Date</label>
            <input id="date" type="date">
            <small id="dateError"></small>

            <button type="submit">Add Transaction</button>

    </form>

    <p id="statusMessage"></p>

</section>

            

    <section>
        <h2>Transactions</h2>
        <button id="sortDate">Sort Date</button>
    <button id="sortAmount">Sort Amount</button>
    <button id="sortDescription">Sort Description</button>

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody id="transactionTableBody"></tbody>
        </table>
    </section>

    <section>
        <h2>Settings</h2>
        <label for="budgetCap">Budget Cap</label>
        <input type="number" id="budgetCap" placeholder="500">
        <button id="setBudgetBtn" type="button">
            Set Budget
        </button>

        
    </section>

</main>

<footer>
    <p>Your Name</p>
</footer>

<script src="app.js"></script>

</body>
</html>
