<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Finance Tracker</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <h1>Student Finance Tracker</h1>
</header>

<main>

    <section>
        <h2>About</h2>
        <p>Track student expenses and spending habits.</p>
    </section>

    <section>
        <h2>Dashboard</h2>
        <p>Total Transactions: 0</p>
        <p>Total Spending: $0</p>
    </section>

    <section>
        <h2>Add Transaction</h2>

        <form id="transactionForm">

            <label for="description">Description</label>
            <input id="description" type="text">
            <small id="descriptionError"></small>

            <label for="amount">Amount</label>
            <input id="amount" type="text">
            <small id="amountError"></small>

            <label for="category">Category</label>
            <input id="category" type="text">
            <small id="categoryError"></small>

            <label for="date">Date</label>
            <input id="date" type="date">
            <small id="dateError"></small>

            <button type="submit">Add Transaction</button>

    </form>

    <p id="statusMessage"></p>

</section>

            <label>Date</label>
            <input type="date">

            <button type="submit">Add</button>
        </form>
    </section>

    <section>
        <h2>Transactions</h2>

        <table>
            <thead>
                <tr>
                    <th>Description</th>
                    <th>Amount</th>
                    <th>Category</th>
                    <th>Date</th>
                </tr>
            </thead>

            <tbody>
            </tbody>
        </table>
    </section>

    <section>
        <h2>Settings</h2>

        <label>Budget Cap</label>
        <input type="number">
    </section>

</main>

<footer>
    <p>Your Name</p>
</footer>

<script src="app.js"></script>

</body>
</html>
